name: Build Android APK

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
    - name: Checkout Source Code
      uses: actions/checkout@v4
    
    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v4

    - name: Locate Project and Compile
      run: |
        # Search for the actual Android project root directory
        PROJECT_ROOT=$(find . -name "settings.gradle" -o -name "settings.gradle.kts" | head -n 1 | xargs dirname)
        
        if [ -z "$PROJECT_ROOT" ]; then
          echo "Could not find settings.gradle, defaulting to root directory."
          PROJECT_ROOT="."
        fi
        
        echo "Navigating into project folder: $PROJECT_ROOT"
        cd "$PROJECT_ROOT"
        
        # Build using wrapper if present, otherwise fall back to system gradle
        if [ -f "./gradlew" ]; then
          echo "Gradle wrapper found. Running build..."
          chmod +x gradlew
          ./gradlew assembleDebug
        else
          echo "Gradle wrapper missing. Falling back to runner's built-in Gradle..."
          gradle assembleDebug
        fi

    - name: Upload APK Artifact
      uses: actions/upload-artifact@v4
      with:
        name: AI-Studio-App-APK
        path: "**/build/outputs/apk/debug/*.apk"
